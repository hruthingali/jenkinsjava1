apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-web-app
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: java-web
  template:
    metadata:
      labels:
        app: java-web
    spec:
      containers:
      - name: java-web-container
        # Replace 'your-username' with your actual Docker Hub username
        image: your-username/my-java-app:latest 
        imagePullPolicy: Always 
        ports:
        - containerPort: 8080

apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-web-app
  labels:
    app: java-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-web
  template:
    metadata:
      labels:
        app: java-web
    spec:
      containers:
      - name: java-web-container
        image: my-java-app:latest # Note: In production, use a registry like Docker Hub
        imagePullPolicy: Never # Tells K8s to use the local image you just built
        ports:
        - containerPort: 8080
